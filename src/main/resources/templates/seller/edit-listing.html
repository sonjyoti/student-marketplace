<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Edit Listing</title>
</head>
<body>
  <h2>Edit Listing</h2>

  <form th:action="@{'/seller/listings/' + ${listing.id} + '/edit'}" method="post" enctype="multipart/form-data">
    <label>
      <input type="text" name="title" th:value="${listing.title}" placeholder="Title" required>
    </label>

    <label>
      <textarea name="description" th:text="${listing.description}" placeholder="Description" required></textarea>
    </label>

    <label>
      <input type="number" step="0.01" name="price" th:value="${listing.price}" placeholder="Price">
    </label>

    <label>
      <input type="text" name="contactInfo" th:value="${listing.contactInfo}" placeholder="Contact Info">
    </label>

    <div th:if="${!#lists.isEmpty(listing.images)}">
      <div th:each="image : ${listing.images}">
        <img th:src="@{/images/{file}(file=${image.imagePath})}" alt="Listing Image" style="width: 150px; height: 150px;">
      </div>
    </div>

    <label>
      <input type="file" name="images" multiple accept="image/" placeholder="Image">
    </label>

    <button type="submit">Update</button>
  </form>
</body>
</html>
